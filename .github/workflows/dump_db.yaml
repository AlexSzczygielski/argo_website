name: Argo - CMS DB backup/synchronization

on:
    workflow_dispatch:
    workflow_call:

jobs:
    synchronize:
            runs-on: ubuntu-latest

            permissions:
              contents: write
              pull-requests: write

            steps:
                - name: Checkout repo
                  uses: actions/checkout@v4
                
                - name: Install dependencies
                  run: sudo apt-get update && sudo apt-get install -y openvpn rsync

                - name: Setup VPN config
                  run: echo "${{ secrets.OVPN_CONFIG }}" > /tmp/vpn.ovpn

                - name: Connect to VPN
                  run: |
                    sudo openvpn --config /tmp/vpn.ovpn --daemon
                    for i in {1..30}; do
                        echo "Attempt $i"
                        if ping -c 1 web.agh.edu.pl; then
                        echo "Connected"
                        exit 0
                        fi
                        sleep 1
                    done
                    echo "VPN connection failed"
                    exit 1

                - name: Load ssh key
                  run: |
                    mkdir -p ~/.ssh
                    printf '%s' "${{ secrets.ARGO_DEPLOY_KEY_PRIVATE }}" > ~/.ssh/argo_deploy
                    chmod 600 ~/.ssh/argo_deploy
                
                - name: Dump database
                  run: |
                    mkdir -p db_backups
                    MYSQL_PWD=${{ secrets.DB_PASS }} mysqldump -h mysql.agh.edu.pl -u argo argo > db_backups/data.sql
                
                - name: Check if anything changed
                  id: check
                  run: |
                    if git status --porcelain | grep -q .; then
                      echo "changed=true" >> $GITHUB_OUTPUT
                    else
                      echo "changed=false" >> $GITHUB_OUTPUT
                    fi
                
                - name: Commit and push to the new branch (if changed)
                  id: commit
                  if: steps.check.outputs.changed == 'true'
                  run: |
                    BRANCH="cms/sync-$(date +%Y-%m-%d--%H-%M-%S)"
                    git config user.name "Argo CMS Bot"
                    git config user.email "argo@agh.edu.pl"
                    git checkout -b "$BRANCH"
                    git add db_backups/data.sql
                    git commit -m "cms: update DB dump - sync from VPS $(date +%Y-%m-%d)"
                    git push origin "$BRANCH"
                    echo "BRANCH=$BRANCH" >> $GITHUB_OUTPUT
                  
                - name: Open PR
                  if: steps.check.outputs.changed == 'true'
                  env:
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  run: |
                    gh pr create \
                      --title "[Database sync - CMS Post Generator] VPS sync $(date +%Y-%m-%d)" \
                      --body "Full DB sync from VPS public_html/db. Review all changes before merging." \
                      --head "${{ steps.commit.outputs.BRANCH }}" \
                      --base main
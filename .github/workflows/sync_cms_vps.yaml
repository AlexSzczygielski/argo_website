name: Argo - CMS automated post generation file synchronization

on:
    workflow_dispatch:

jobs:
    synchronize:
            runs-on: ubuntu-latest
            steps:
                - name: Checkout repo
                  uses: actions/checkout@v4
                
                - name: Install dependencies
                  run: sudo apt-get update && sudo apt-get install -y openvpn rsync

                - name: Setup VPN config
                  run: echo "${{ secrets.OVPN_CONFIG }}" > /tmp/vpn.ovpn

                - name: Connect to VPN
                  run: |
                    sudo openvpn --config /tmp/vpn.ovpn --daemon
                    for i in {1..30}; do
                        echo "Attempt $i"
                        if ping -c 1 web.agh.edu.pl; then
                        echo "Connected"
                        exit 0
                        fi
                        sleep 1
                    done
                    echo "VPN connection failed"
                    exit 1

                - name: Load ssh key
                  run: |
                    mkdir -p ~/.ssh
                    printf '%s' "${{ secrets.ARGO_DEPLOY_KEY_PRIVATE }}" > ~/.ssh/argo_deploy
                    chmod 600 ~/.ssh/argo_deploy
                
                - name: Get files from AGH VPS - rsync
                  run: |
                    rsync -avz --delete \
                    --exclude=".git" \
                    --exclude=".github" \
                    --exclude="tools/" \
                    --exclude="*.md" \
                    -e "ssh -i ~/.ssh/argo_deploy -o StrictHostKeyChecking=no" \
                    argo@web.agh.edu.pl:public_html/ ./